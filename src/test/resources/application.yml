novari:
  org-id: novari.no
fint:
  application-id: flyt-web-resource-server-test

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: null
      client:
        provider:
          fint-idp:
            token-uri: http://localhost/token
        registration:
          authorization-service:
            authorization-grant-type: client_credentials
            client-id: test-client
            client-secret: test-secret
            provider: fint-idp
